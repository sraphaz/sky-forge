version: "1.0"
spec_version: "1.1"
slug: example-horta
sky_score: 52
score_kind: intent
elevation_level: rise

policies:
  open_to_elevation: true
  open_to_humanity_connections: true
  open_to_ux_dignity_review: true

weights:
  SPI: 0.25
  HCE: 0.20
  GAP: 0.20
  CWB: 0.20
  UXD: 0.15

# Caso-benchmark de calibração (SKY_INDICES_METHOD.md §6) — scores esperados.
# Mudança de espec que altere estes valores exige justificativa em RFC.
indices:
  SPI:
    score: 55
    confidence: medium
    band: 10
    rationale: |
      Horta comunitária fortalece autonomia alimentar local e troca no bairro.
    evidence:
      - type: intake
        ref: "Criador descreve motivação comunitária e autonomia alimentar do bairro"
      - type: artifact
        ref: "brief-draft.yaml → motivation: troca de mudas e alimentos no território"
  HCE:
    score: 50
    confidence: low
    band: 14
    rationale: |
      Calendário de plantio pode educar práticas regenerativas se copy for didático.
    evidence: []
  GAP:
    score: 45
    confidence: medium
    band: 11
    rationale: |
      Conexão moderada com CH-BIODIVERSITY e CH-LOCAL-ECONOMY.
    evidence:
      - type: artifact
        ref: "sky-merits.yaml → humanity_connections com CH-BIODIVERSITY e CH-LOCAL-ECONOMY"
      - type: intake
        ref: "Criador confirma mapa de hortas como feature central, não narrativa"
  CWB:
    score: 58
    confidence: low
    band: 13
    rationale: |
      Coesão de vizinhança e cuidado coletivo alinhados ao produto.
    evidence:
      - type: intake
        ref: "Criador nomeia o bairro como grupo beneficiado e vínculo existente"
  UXD:
    score: 40
    confidence: low
    band: 12
    rationale: |
      ux-spec ainda não produzido; alvo WCAG AA e baixa excitação.
    evidence: []

elevation_suggestions:
  - id: ELV-001
    title: Parceria com hortas escolares do bairro
    description: |
      Expandir calendário para incluir oficinas abertas — aumenta HCE e CWB
      sem alterar core do mapa.
    challenge_id: CH-EDUCATION
    impact_indices: [HCE, CWB]
    ai_suggested: true
    user_confirmed: null
    evidenced: false
    scope: post_mvp
  - id: ELV-002
    title: Modo offline leve para consulta do mapa
    description: |
      Inclusão digital em conectividade fraca — alinha CH-INEQUALITY.
    challenge_id: CH-INEQUALITY
    impact_indices: [SPI, GAP]
    ai_suggested: true
    user_confirmed: null
    evidenced: false
    scope: optional

humanity_connections:
  - challenge_id: CH-BIODIVERSITY
    product_feature: Mapa de hortas com geolocalização
    connection_rationale: |
      Território como referência — lugares vivos, não abstração de feed global.
    ai_suggested: true
  - challenge_id: CH-LOCAL-ECONOMY
    product_feature: Calendário de troca de mudas e ferramentas
    connection_rationale: |
      Economia de vizinhança sem marketplace agressivo.
    ai_suggested: true

ux_design:
  principles:
    - mobile_first
    - wcag_aa
    - low_excitation
    - design_tokens_only
  accessibility_target: WCAG 2.1 AA
  excitation_level: low
  design_tokens_required: true

cycles: []
impact_checkpoints: []
