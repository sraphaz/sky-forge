id: sky-test-architecture
name: Sky Test Architecture
description: |
  Estratégia de testes consultiva (TEA) — risk-based, a11y e gates de CI
  a partir de nfr.yaml e ux-spec.yaml.
inputs:
  slug: kebab-case
steps:
  - read: .sky/sessions/{slug}/nfr.yaml
  - read: .sky/sessions/{slug}/ux-spec.yaml
  - read: .sky/sessions/{slug}/functional-requirements.yaml
  - read: templates/testing/test-strategy.template.md
  - agent: test-architect — test-strategy.md (consult)
  - write: .sky/sessions/{slug}/testing/test-strategy.md
guardrails:
  consult_only: true
  requires_nfr_or_ux: true
  axe_playwright_when_ux_aa: true
