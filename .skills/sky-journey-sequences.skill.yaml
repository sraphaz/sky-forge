id: sky-journey-sequences
name: Sky Journey Sequences
description: Diagramas de sequência das jornadas principais e fluxograma de contexto.
inputs:
  slug: kebab-case
steps:
  - read: .sky/sessions/{slug}/ux-spec.yaml
  - read: .sky/sessions/{slug}/functional-requirements.yaml
  - read: .sky/sessions/{slug}/architecture/c4-containers.md
  - check: pipeline_unlock architecture
  - agent: journey-sequence-modeler — context-flow.md + sequences/*.md
  - write: .sky/sessions/{slug}/architecture/sequences/
guardrails:
  min_journeys: 2
  cite_rf_ids: true
