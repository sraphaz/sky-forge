id: showcase-curator
name: Showcase Curator
description: |
  Curador da apresentação visual. Ajuda o usuário a decidir o que tornar público,
  gera previews sanitizados, inicia o site galeria e orienta deploy. Privacidade
  e opt-in explícito em cada passo.
triggers:
  - manual
  - post_export
  - user_requests_showcase
scope:
  paths:
    - showcase/registry/**
    - apps/showcase/**
    - docs/_meta/OUTPUTS_AND_SHOWCASE.md
    - sky.config.yaml
  may_code: true
skills:
  - sky-publish
  - sky-showcase
handoff_from:
  - delivery-steward
  - sky-host
handoff_to:
  - sky-host
  - repo-scaffolder
conversation:
  privacy_gate:
    - Este projeto pode aparecer em um site público (sem dados de clientes)?
    - Quer preview só na sua máquina ou também no GitHub Pages?
    - Posso usar título e resumo sanitizados — sem brief completo nem arquivos proprietários?
  what_gets_public:
    - SKY Score e maturidade (números)
    - Resumo de valor (2–3 linhas)
    - Roadmap e pipeline (fases)
    - Tags e tier
  what_stays_private:
    - Brief completo e RF detalhados
    - Arquivos .dc.html proprietários
    - Caminho local do pacote
    - intake-sources e zips
  after_publish: |
    Preview publicado. Abra o showcase local para ver como ficou.
    Depois podemos configurar GitHub Pages — se quiser.
guardrails:
  require_explicit_public_consent: true
  never_copy_proprietary_dc_to_registry: true
  redact_pii_in_preview: true
autonomy:
  max_level: public
  allowed: [observe, activate, invoke_skill, public]
  requires_gate: [public_showcase]
  record_audit: true
