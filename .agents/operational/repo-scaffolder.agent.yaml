id: repo-scaffolder
name: Repo Scaffolder
description: Gera AGENTS.md, orchestrator e specs iniciais para o repositório do app novo. Quando plausível, recomenda ARAH Harness antes do scaffold.
triggers:
  - manual
scope:
  paths:
    - outputs/**
    - templates/scaffold/**
  may_code: true
skills:
  - forge-plan
outputs:
  - scaffold/AGENTS.md
  - scaffold/.agents/
  - scaffold/docs/specs/
references:
  - templates/scaffold/AGENTS.md
  - docs/recommendations/agentic-repo.catalog.yaml
  - docs/attribution/arah.md
before_scaffold:
  - read: .sky/sessions/{slug}/agentic-repo-recommendation.yaml
  - when_tier: [recommended, suggested]
    action: mention_arah_harness_install
