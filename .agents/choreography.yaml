# Coreografia — Sky-Forge v3
# Autonomia explícita + gates + triggers para choreograph-agents.ps1
version: 3
updated: 2026-07-04
policy: |
  Agentes operam dentro do nível de autonomia declarado. Ações acima do nível
  ou sem human gate são bloqueadas e registradas em .sky/audit/{slug}/events.jsonl.
  sky-host roteia; especialistas executam; domínio só consulta.

autonomy_ref: .agents/autonomy.yaml

triggers:
  - id: manual
    description: Usuário no Cursor ou CLI
  - id: path_change
    description: Arquivos tocados na sessão
  - id: maturity_gate
    description: overall_readiness cruzou limiar
  - id: post_export
    description: Após export bem-sucedido
  - id: hook_stop
    description: Hook Cursor stop — auditoria passiva

rules:
  - id: experience-host
    when: [manual, path_change]
    paths:
      - sky.config.yaml
      - docs/_meta/USER_JOURNEY.md
      - docs/_meta/OUTPUTS_AND_SHOWCASE.md
    agents:
      - id: sky-host
        type: operational
        autonomy: [observe, route]
        max_autonomy: route
      - id: delivery-steward
        type: operational
        autonomy: [observe, activate, invoke_skill]
        max_autonomy: invoke_skill
        skills: [sky-deliver, sky-export, sky-validate]
        requires_gate: [package]
      - id: showcase-curator
        type: operational
        autonomy: [observe, activate, invoke_skill]
        max_autonomy: invoke_skill
        skills: [sky-publish, sky-showcase]
        requires_gate: [public_showcase]

  - id: intake-sessions
    when: [manual, path_change]
    paths:
      - .sky/sessions/**
    agents:
      - id: sky-host
        type: operational
        autonomy: [observe, route]
        max_autonomy: route
      - id: intake-conductor
        type: operational
        autonomy: [observe, activate, invoke_skill]
        max_autonomy: activate
        skills: [sky-intake, sky-approve, sky-elevate]
        requires_gate: [brief]
      - id: sky-elevator
        type: domain
        autonomy: [observe, consult]
        max_autonomy: consult
      - id: market-benchmark
        type: domain
        autonomy: [observe, consult]
        max_autonomy: consult
      - id: ux-design-specialist
        type: operational
        autonomy: [observe, consult, activate]
        max_autonomy: activate
        skills: [sky-elevate]
      - id: cost-tier-advisor
        type: domain
        autonomy: [consult]
        max_autonomy: consult
      - id: ux-product
        type: domain
        autonomy: [consult]
        max_autonomy: consult

  - id: humanity-docs
    when: [path_change]
    paths:
      - docs/humanity/**
      - docs/_meta/SKY_MERIT_INDICES.md
    agents:
      - id: sky-elevator
        type: domain
        autonomy: [consult]
        max_autonomy: consult

  - id: showcase-visual
    when: [manual, path_change, post_export]
    paths:
      - showcase/**
      - apps/showcase/**
    agents:
      - id: showcase-curator
        type: operational
        autonomy: [observe, activate, invoke_skill, public]
        max_autonomy: public
        skills: [sky-publish, sky-showcase]
        requires_gate: [public_showcase]
      - id: sky-host
        type: operational
        autonomy: [route]
        max_autonomy: route

  - id: outputs-package
    when: [path_change, post_export, maturity_gate]
    paths:
      - outputs/**
    maturity_min: 0.55
    agents:
      - id: delivery-steward
        type: operational
        autonomy: [observe, activate, invoke_skill, side_effect]
        max_autonomy: side_effect
        skills: [sky-deliver, sky-export, sky-validate]
        requires_gate: [package]
      - id: showcase-curator
        type: operational
        autonomy: [observe, invoke_skill]
        max_autonomy: invoke_skill
        skills: [sky-publish]

  - id: export-cloud-design
    when: [path_change]
    paths:
      - extensions/sky-cloud-design/**
    agents:
      - id: delivery-steward
        type: operational
        autonomy: [invoke_skill, side_effect]
        max_autonomy: side_effect
        skills: [sky-export, sky-validate]
        requires_gate: [package]
      - id: prompt-assembler
        type: operational
        autonomy: [invoke_skill]
        max_autonomy: invoke_skill
        skills: [sky-export, sky-validate]

  - id: specs-harness
    when: [path_change]
    paths:
      - docs/specs/**
      - scripts/harness/**
    agents:
      - id: intake-conductor
        type: operational
        autonomy: [activate]
        max_autonomy: activate
        skills: [sky-validate]

  - id: architecture-spec
    when: [manual, path_change, maturity_gate]
    paths:
      - .sky/sessions/**/architecture/**
      - outputs/**/architecture/**
      - templates/architecture/**
    maturity_min: 0.55
    agents:
      - id: solutions-architect
        type: operational
        autonomy: [observe, activate]
        max_autonomy: activate
        skills: [sky-plan, sky-c4-model, sky-journey-sequences, sky-agent-architecture]
        requires_gate: [architecture]
      - id: c4-modeler
        type: operational
        autonomy: [observe, activate]
        max_autonomy: activate
        skills: [sky-c4-model]
        requires_gate: [architecture]
      - id: journey-sequence-modeler
        type: operational
        autonomy: [observe, activate]
        max_autonomy: activate
        skills: [sky-journey-sequences]
        requires_gate: [architecture]
      - id: clean-craft-advisor
        type: domain
        autonomy: [consult]
        max_autonomy: consult
        skills: [sky-clean-craft]
      - id: stack-curator
        type: domain
        autonomy: [consult]
        max_autonomy: consult
      - id: security-compliance
        type: domain
        autonomy: [consult]
        max_autonomy: consult
      - id: test-architect
        type: domain
        autonomy: [consult]
        max_autonomy: consult
        skills: [sky-test-architecture]

  - id: quality-spec
    when: [manual, path_change, maturity_gate]
    paths:
      - .sky/sessions/**/nfr.yaml
      - .sky/sessions/**/ux-spec.yaml
      - .sky/sessions/**/testing/**
      - outputs/**/testing/**
    maturity_min: 0.55
    agents:
      - id: test-architect
        type: domain
        autonomy: [consult]
        max_autonomy: consult
        skills: [sky-test-architecture]
      - id: ux-design-specialist
        type: operational
        autonomy: [consult]
        max_autonomy: consult

  - id: agent-ops
    when: [manual]
    paths:
      - .agents/**
      - scripts/agents/**
      - docs/_meta/AGENT_*.md
      - docs/ops/AGENT_GRAPH.md
    agents:
      - id: orchestrator
        type: operational
        autonomy: [observe, route]
        max_autonomy: route

co_activation:
  - primary: intake-conductor
    consult: [sky-elevator, ux-design-specialist, cost-tier-advisor]
    on_phase: [elevate, shape]
    party: elevation-party
  - primary: delivery-steward
    consult: [security-compliance, test-architect]
    on_phase: [deliver]
    party: deliver-party
  - primary: showcase-curator
    route_after: sky-host
    on_phase: [showcase]
  - primary: solutions-architect
    consult: [c4-modeler, journey-sequence-modeler, clean-craft-advisor, test-architect, stack-curator, security-compliance]
    on_phase: [specify, elevate]
    party: architecture-party
  - primary: c4-modeler
    consult: [clean-craft-advisor, stack-curator]
    on_phase: [specify]
  - primary: repo-scaffolder
    consult: [test-architect, security-compliance]
    on_phase: [implement]
    party: implement-party

# Party Mode — sessão multi-especialista mediada por sky-host (padrão BMAD, adaptado)
# sky-host sintetiza consultas em até 4 opções; não substitui uma decisão por turno.
party_mode:
  policy: |
    Reúne consultas paralelas de domínio. O host apresenta síntese — nunca export + publish
    no mesmo turno. Ativado por fase UX (journey.yaml current_phase).
  sessions:
    - id: elevation-party
      label: Elevação colaborativa
      host: sky-host
      primary: intake-conductor
      consult: [sky-elevator, ux-design-specialist, cost-tier-advisor, market-benchmark]
      on_phase: [shape, elevate]
    - id: architecture-party
      label: Especificação arquitetural
      host: sky-host
      primary: solutions-architect
      consult: [c4-modeler, journey-sequence-modeler, clean-craft-advisor, test-architect, stack-curator, security-compliance]
      on_phase: [specify]
    - id: deliver-party
      label: Entrega do pacote
      host: sky-host
      primary: delivery-steward
      consult: [security-compliance, test-architect, showcase-curator]
      on_phase: [deliver]
    - id: implement-party
      label: Implementação guiada
      host: sky-host
      primary: repo-scaffolder
      consult: [test-architect, security-compliance, prompt-assembler]
      on_phase: [implement]
