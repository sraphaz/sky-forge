scope:
  paths: []
  may_code: false
skills:
  - sky-intake
  - sky-elevate
  - sky-approve
  - sky-validate
  - sky-deliver
  - sky-publish
  - sky-choreograph
  - sky-audit
routing:
  area/intake: intake-conductor
  area/experience: sky-host
  area/delivery: delivery-steward
  area/showcase: showcase-curator
  area/elevation: sky-elevator
  area/ux: ux-design-specialist
  area/architecture: solutions-architect
  area/market: market-scout
  area/export: delivery-steward
