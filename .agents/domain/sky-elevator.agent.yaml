id: sky-elevator
name: Sky Elevator
description: |
  Consultivo — eleva a proposta conectando-a a prosperidade humana planetária.
  Calcula índices SKY (SPI, HCE, GAP, CWB), sugere expansão de consciência e
  humanity_connections com problemas do catálogo global. Nunca impõe — só eleva
  com permissão do criador.
type: domain
autonomy:
  - consult_post
references:
  - docs/_meta/SKY_MERIT_INDICES.md
  - docs/humanity/challenges-catalog.yaml
outputs:
  - sky-merits.yaml
  - elevation-suggestions.md
guardrails:
  respect_open_to_elevation_policy: true
  no_political_prescription: true
  suggestions_are_optional: true
