# destino: sky-forge/schemas/package.schema.yaml
# Manifesto de um Sky-Forge Package exportado — a unidade de troca entre sistemas.
# Todo consumidor (plugin) valida ESTE arquivo antes de qualquer artefato.

schema: sky-forge/package
version: 0.1.0

fields:
  package_id:       {type: string, required: true}     # ex.: pkg-<slug>-v<N>
  contract_version: {type: semver, required: true}     # versão do contrato de artefatos
  profile:          {type: string, required: true}     # id do profile usado
  profile_version:  {type: semver, required: true}
  demand_ref:       {type: string, required: true}     # id externo, opaco para o core
  created_at:       {type: datetime, required: true}
  created_by:       {type: string, required: true}     # humano responsável pelo run
  run_ref:          {type: string}                     # pasta/branch do run de origem

  artifacts:                                           # todos os arquivos do pacote
    type: list, required: true, min_items: 1
    item:
      name:           {type: string, required: true}   # nome lógico (ex.: proposal-scope)
      file:           {type: string, required: true}   # nome do arquivo no pacote
      schema_version: {type: semver, required: true}
      sha256:         {type: string, required: true}   # integridade — plugin bloqueia se divergir
      status:         {type: enum[final, draft], default: final}

  gates:                                               # gates humanos do profile, registrados
    type: list, required: true
    item:
      id:        {type: string, required: true}
      passed_by: {type: string, required: true}        # identidade humana — o CLI não inventa
      at:        {type: datetime, required: true}
      notes:     {type: string}

  validation:
    profile_rules_passed: {type: bool, required: true} # export só existe se true
    report_file:          {type: string}               # relatório de validação incluído

validations_expected:
  - "todos os artifacts.required do profile presentes com status=final"
  - "todos os gates do profile presentes em gates[]"
  - "sha256 de cada arquivo confere (recalculado na importação)"
  - "profile_rules_passed == true"

example:
  package_id: pkg-surya-workspace-mvp-v1
  contract_version: 0.1.0
  profile: consulting-handoff
  profile_version: 0.1.0
  demand_ref: dem-2026-001
  created_at: 2026-07-06T18:00:00-03:00
  created_by: raphael
  artifacts:
    - {name: brief, file: brief.yaml, schema_version: 0.1.0, sha256: "…", status: final}
  gates:
    - {id: intent_confirmed, passed_by: raphael, at: 2026-06-30T10:00:00-03:00}
  validation: {profile_rules_passed: true, report_file: validation-report.txt}
