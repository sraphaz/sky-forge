# evolution-roadmap.schema.yaml — fases incrementais de evolução brownfield

schema: sky-forge/evolution-roadmap
version: 0.1.0

fields:
  version:       {type: string, required: true}
  slug:          {type: string, required: true}
  profile:       {type: string, required: true}
  updated_at:    {type: datetime, required: true}
  baseline_ref:  {type: string, required: true}   # platform-assessment assessed_at ou git commit

  vision:        {type: string, required: true}   # estado alvo em 1–3 frases
  constraints:   {type: list<string>}

  phases:
    type: list
    required: true
    min_items: 1
    item:
      id:          {type: string, required: true}
      title:       {type: string, required: true}
      priority:    {type: enum[P0, P1, P2, P3]}
      status:      {type: enum[planned, in_progress, done, deferred]}
      depends_on:  {type: list<string>}
      deliverables: {type: list<string>}
      done_when:   {type: string, required: true}
      rf_refs:     {type: list<string>}            # refs externas (ex.: RF07)
      gate:        {type: string}                  # gate humano antes de iniciar, se houver

  acceptance_summary: {type: string}
  ai_suggested:       {type: boolean, default: true}

validations_expected:
  - "phases não vazio"
  - "todo phase tem done_when verificável (não vazio)"
  - "baseline_ref resolve para platform-assessment existente"

example:
  slug: surya-labs-workspace
  vision: "Workspace governa ciclo comercial completo com proposta, ledger e export."
  phases:
    - id: phase-proposal-ledger
      title: "Proposta executável + approval ledger"
      priority: P0
      status: planned
      done_when: "RF06 gerador operacional e RF07 API/CLI de escrita com testes"
      rf_refs: [RF06, RF07]
