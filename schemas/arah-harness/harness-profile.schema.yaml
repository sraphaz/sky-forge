# harness-profile.schema.yaml — declaração do profile instalado num repositório
# Escrito pelo install-harness na raiz do repo alvo. Lido pelo doctor e por consumidores
# (ex.: Surya Workspace lê este arquivo para exibir status de governança).

schema: arah-harness/harness-profile
version: 0.1.0

fields:
  harness:
    version:      {type: semver, required: true}       # versão do arah-harness instalada
    profile:      {type: enum[minimal, consulting, product, enterprise, open-source], required: true}
    installed_at: {type: datetime, required: true}
    installed_by: {type: string, required: true}       # humano responsável
  project:
    name:         {type: string, required: true}
    owner:        {type: string}
  options:                                             # opções do profile aplicadas
    type: map
    known_keys:
      spec_before_work:      {type: bool, default: true}
      block_direct_main:     {type: bool, default: true}
      secrets_scan:          {type: bool, default: true}
      require_adr:           {type: bool}
      approval_gates:        {type: list<string>}      # ids de gates ativos (ver approval-gate.schema)
  managed_blocks:                                      # o que o harness gerencia (p/ update/uninstall)
    type: list<string>                                 # paths sob gestão do harness
  doctor:
    last_run:     {type: datetime}
    status:       {type: enum[ok, drift, failing]}
    report_ref:   {type: string}

example:
  harness: {version: 0.1.0, profile: consulting, installed_at: 2026-07-10T10:00:00-03:00, installed_by: raphael}
  project: {name: estufa-monitorada, owner: agrovale}
  options:
    spec_before_work: true
    block_direct_main: true
    secrets_scan: true
    approval_gates: [proposal_before_implementation, handoff_acceptance]
  managed_blocks: [AGENTS.md, docs/governance/, .github/workflows/harness-*, .agents/]
  doctor: {last_run: 2026-07-11T08:00:00-03:00, status: ok, report_ref: .harness/doctor-latest.md}
