name: Deploy Showcase (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - "apps/showcase/**"
      - "showcase/registry/**"
      - ".github/workflows/showcase-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: showcase-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/showcase
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/showcase/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      # PNGs de diagramas já versionados em public/ — evita likec4 no CI
      - name: Build static site
        run: pnpm exec astro build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/showcase/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
